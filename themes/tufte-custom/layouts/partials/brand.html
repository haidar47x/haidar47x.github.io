<header class="brand">
    {{ if isset .Site.Params "pronunciation" }}
    {{ if eq .Page.RelPermalink "/" }}
    <h1 class="with-pronunciation">{{ .Site.Title }}</h1>
    <h4 class="pronunciation">/'{{ .Site.Params.pronunciation }}/</h4>
    {{ else }}
    <h1>{{ .Site.Title }}</h1>
    {{ end }}
    {{ else }}
    <h1>{{ .Site.Title }}</h1>
    {{ end }}
    <p class="subtitle">{{ .Site.Params.subtitle }}</p>
    {{ partial "nav.html" . }}
</header>
